<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanksgiving Chorus Mixer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .mixer-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #1a1a1a; margin-top: 0; margin-bottom: 25px; }
        .control-group { margin-bottom: 20px; }
        .label { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 600; color: #555; margin-bottom: 8px; }
        input[type=range] { width: 100%; height: 6px; border-radius: 5px; background: #ddd; appearance: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4a90e2; cursor: pointer; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #2ecc71; color: white; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .btn-pause { background: #e74c3c; display: none; }
    </style>
</head>
<body>

<div class="mixer-card">
    <h2>Chorus Mixer</h2>

    <div class="control-group">
        <div class="label"><span>Melody</span><span id="disp0">100%</span></div>
        <input type="range" id="vol0" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Harmony 1</span><span id="disp1">100%</span></div>
        <input type="range" id="vol1" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Harmony 2</span><span id="disp2">100%</span></div>
        <input type="range" id="vol2" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Piano</span><span id="disp3">100%</span></div>
        <input type="range" id="vol3" min="0" max="1" step="0.01" value="1">
    </div>

    <button id="playBtn" onclick="initAndPlay()">Load & Play All</button>
    <button id="pauseBtn" class="btn-pause" onclick="pauseAudio()">Pause</button>
</div>

<script>
    const urls = [
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGMelody.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGH1.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGH2.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGPiano.mp3'
    ];

    let audioCtx = null;
    let audioBuffers = [];
    let activeSources = [];
    let gainNodes = [];
    let pausedAt = 0;
    let isPlaying = false;

    async function initAndPlay() {
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // 1. Establish Engine
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // 2. THE SILENT UNLOCK HACK
        // This must run synchronously the moment the button is clicked to bypass mobile blocks
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const unlockSource = audioCtx.createOscillator();
        const unlockGain = audioCtx.createGain();
        unlockGain.gain.value = 0; // Completely silent
        unlockSource.connect(unlockGain);
        unlockGain.connect(audioCtx.destination);
        unlockSource.start(0);
        unlockSource.stop(audioCtx.currentTime + 0.1);

        // 3. Download the actual audio data securely
        if (audioBuffers.length === 0) {
            playBtn.innerText = "Downloading Tracks... (Please wait)";
            playBtn.disabled = true;

            try {
                for (let i = 0; i < urls.length; i++) {
                    const response = await fetch(urls[i]);
                    const arrayBuffer = await response.arrayBuffer();
                    
                    const buffer = await new Promise((resolve, reject) => {
                        audioCtx.decodeAudioData(arrayBuffer, resolve, reject);
                    });
                    audioBuffers.push(buffer);

                    const gainNode = audioCtx.createGain();
                    gainNode.connect(audioCtx.destination);
                    gainNodes.push(gainNode);

                    const slider = document.getElementById(`vol${i}`);
                    const disp = document.getElementById(`disp${i}`);
                    slider.addEventListener('input', (e) => {
                        gainNode.gain.value = e.target.value;
                        disp.innerText = Math.round(e.target.value * 100) + '%';
                    });
                }
            } catch (err) {
                console.error("Failed to load audio:", err);
                playBtn.innerText = "Error Loading. Tap to Retry.";
                playBtn.disabled = false;
                return;
            }
        }

        // 4. Playback all tracks simultaneously
        activeSources.forEach(source => source.stop());
        activeSources = [];

        const startTime = audioCtx.currentTime + 0.05; 

        audioBuffers.forEach((buffer, index) => {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true; 
            source.connect(gainNodes[index]);
            source.start(startTime, pausedAt);
            activeSources.push(source);
        });

        isPlaying = true;
        playBtn.innerText = "Force Resync to Start";
        playBtn.disabled = false;
        pauseBtn.style.display = "block";
        pausedAt = 0;
    }

    function pauseAudio() {
        if (audioCtx && audioCtx.state === 'running') {
            audioCtx.suspend();
            isPlaying = false;
            document.getElementById('pauseBtn').style.display = "none";
            document.getElementById('playBtn').innerText = "Resume Playback";
        }
    }
</script>

</body>
</html>
