<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanksgiving Chorus Mixer</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .mixer-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .control-group { margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #2ecc71; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="mixer-card">
    <h2>Chorus Mixer</h2>
    <div id="controls"></div>
    <button id="playBtn">Play All</button>
</div>

<script>
    const tracks = [
        { name: 'Melody', url: 'https://wjohnson93.github.io/TG-Worship-Chorus/TGMelody.mp3' },
        { name: 'Harmony 1', url: 'https://wjohnson93.github.io/TG-Worship-Chorus/TGH1.mp3' },
        { name: 'Harmony 2', url: 'https://wjohnson93.github.io/TG-Worship-Chorus/TGH2.mp3' },
        { name: 'Piano', url: 'https://wjohnson93.github.io/TG-Worship-Chorus/TGPiano.mp3' }
    ];

    let audioCtx;
    let audioElements = [];

    // 1. Create simple HTML audio elements for each track
    tracks.forEach((track, index) => {
        const audio = new Audio(track.url);
        audio.loop = true;
        audio.preload = "auto";
        audioElements.push(audio);

        // Add volume slider UI
        document.getElementById('controls').innerHTML += `
            <div class="control-group">
                <label>${track.name}</label><br>
                <input type="range" min="0" max="1" step="0.01" value="1" 
                    oninput="audioElements[${index}].volume = this.value">
            </div>
        `;
    });

    // 2. Play all simultaneously on click
    document.getElementById('playBtn').addEventListener('click', () => {
        // This gesture satisfies mobile autoplay security
        audioElements.forEach(audio => {
            audio.currentTime = 0;
            audio.play().catch(e => console.error("Playback failed", e));
        });
        document.getElementById('playBtn').innerText = "Playing...";
    });
</script>
</body>
</html>
