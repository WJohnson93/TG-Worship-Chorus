<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const urls = [
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGMelody.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGH1.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGH2.mp3',
        'https://wjohnson93.github.io/TG-Worship-Chorus/TGPiano.mp3'
    ];

    let buffers = [];
    let sources = [];
    let gainNodes = [];
    let isPlaying = false;
    let startTime = 0;
    let pausedAt = 0;

    async function init() {
        document.getElementById('status').innerText = "Downloading files...";
        try {
            const buffersData = await Promise.all(urls.map(async (url) => {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const arrayBuffer = await response.arrayBuffer();
                return await audioCtx.decodeAudioData(arrayBuffer);
            }));
            buffers = buffersData;
            document.getElementById('status').innerText = "Ready! Click Play.";
            document.getElementById('playBtn').disabled = false;
        } catch (e) {
            console.error("Error loading audio:", e);
            document.getElementById('status').innerText = "Error: " + e.message;
        }
    }

    async function togglePlay() {
        // ALWAYS resume context on user interaction
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }

        if (isPlaying) {
            pausedAt = audioCtx.currentTime - startTime;
            sources.forEach(s => s.stop());
            sources = [];
            isPlaying = false;
            document.getElementById('playBtn').innerText = "Play";
        } else {
            startTime = audioCtx.currentTime - pausedAt;
            buffers.forEach((buffer, i) => {
                const source = audioCtx.createBufferSource();
                const gainNode = audioCtx.createGain();
                source.buffer = buffer;
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                // Get volume from the specific slider
                const slider = document.querySelectorAll('input[type=range]')[i];
                gainNode.gain.value = slider.value;
                
                source.start(0, pausedAt);
                sources.push(source);
                gainNodes.push(gainNode);
            });
            isPlaying = true;
            document.getElementById('playBtn').innerText = "Pause";
        }
    }

    // Initialize
    init();
</script>
