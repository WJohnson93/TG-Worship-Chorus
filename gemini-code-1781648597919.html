<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanksgiving Chorus Mixer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .mixer-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #1a1a1a; margin-top: 0; margin-bottom: 25px; }
        .control-group { margin-bottom: 20px; }
        .label { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 600; color: #555; margin-bottom: 8px; }
        input[type=range] { width: 100%; height: 6px; border-radius: 5px; background: #ddd; appearance: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4a90e2; cursor: pointer; }
        .master-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .master-btns { display: flex; gap: 12px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-play { background: #2ecc71; color: white; }
        .btn-pause { background: #e74c3c; color: white; }
        .btn-resync { background: #34495e; color: white; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="mixer-card">
    <h2>Chorus Mixer</h2>

    <audio id="audio-melody" src="https://wjohnson93.github.io/TG-Worship-Chorus/TGMelody.mp3" loop></audio>
    <audio id="audio-h1" src="https://wjohnson93.github.io/TG-Worship-Chorus/TGH1.mp3" loop></audio>
    <audio id="audio-h2" src="https://wjohnson93.github.io/TG-Worship-Chorus/TGH2.mp3" loop></audio>
    <audio id="audio-piano" src="https://wjohnson93.github.io/TG-Worship-Chorus/TGPiano.mp3" loop></audio>

    <div class="control-group">
        <div class="label"><span>Melody</span><span id="v1">100%</span></div>
        <input type="range" id="vol-melody" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Harmony 1</span><span id="v2">100%</span></div>
        <input type="range" id="vol-h1" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Harmony 2</span><span id="v3">100%</span></div>
        <input type="range" id="vol-h2" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="control-group">
        <div class="label"><span>Piano</span><span id="v4">100%</span></div>
        <input type="range" id="vol-piano" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="master-controls">
        <div class="master-btns">
            <button class="btn-play" onclick="playAll()">Play All</button>
            <button class="btn-pause" onclick="pauseAll()">Pause All</button>
        </div>
        <button class="btn-resync" onclick="resyncAll()">Force Resync Tracks</button>
    </div>
</div>

<script>
    const tracks = [
        { el: document.getElementById('audio-melody'), vol: document.getElementById('vol-melody'), disp: document.getElementById('v1') },
        { el: document.getElementById('audio-h1'), vol: document.getElementById('vol-h1'), disp: document.getElementById('v2') },
        { el: document.getElementById('audio-h2'), vol: document.getElementById('vol-h2'), disp: document.getElementById('v3') },
        { el: document.getElementById('audio-piano'), vol: document.getElementById('vol-piano'), disp: document.getElementById('v4') }
    ];

    tracks.forEach(t => {
        t.vol.oninput = () => {
            t.el.volume = t.vol.value;
            t.disp.innerText = Math.round(t.vol.value * 100) + '%';
        };
    });

    function playAll() {
        tracks.forEach(t => {
            t.el.play();
        });
    }

    function pauseAll() {
        tracks.forEach(t => t.el.pause());
    }

    function resyncAll() {
        // Snaps all playing tracks back to the exact same starting point if they drift
        const targetTime = tracks[0].el.currentTime;
        tracks.forEach(t => {
            t.el.currentTime = targetTime;
        });
    }
</script>

</body>
</html>
